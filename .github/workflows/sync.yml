name: Sync Upstream (cmliu/edgetunnel)

on:
  schedule:
    - cron: '0 4 * * *'  # 每天北京时间12点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and check updates
        id: check
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream
          
          # 获取最新提交的哈希
          UPSTREAM_HASH=$(git rev-parse upstream/main)
          LOCAL_HASH=$(git rev-parse origin/main)
          
          echo "Upstream: $UPSTREAM_HASH"
          echo "Local: $LOCAL_HASH"
          
          if [ "$UPSTREAM_HASH" = "$LOCAL_HASH" ]; then
            echo "✅ Already up to date, no sync needed"
            echo "needs_sync=false" >> $GITHUB_OUTPUT
          else
            echo "🔄 Updates available, need to sync"
            echo "needs_sync=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.needs_sync == 'true'
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
          echo "✅ Sync completed successfully"
