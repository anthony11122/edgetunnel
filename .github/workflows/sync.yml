
name: Sync Upstream (cmliu/edgetunnel)

on:
  schedule:
    - cron: '0 4 * * *'  # 每天 UTC 04:00 (北京时间12点)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and sync
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git main
