name: Sync Fork
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: upstream } = await github.rest.repos.get({
              owner: 'cmliu',
              repo: 'edgetunnel'
            });
            // 创建 PR 同步
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Sync upstream',
              head: 'cmliu:main',
              base: 'main',
              body: '自动同步上游更新'
            });
